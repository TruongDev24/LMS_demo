<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Góc Học Tập Nhỏ Của Bạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 shadow">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between text-white">
            <a th:href="@{/}" class="hover:text-gray-300 font-bold text-xl"><i class="fa-solid fa-graduation-cap mr-2"></i>LMS Academy</a>
            <div class="flex items-center gap-4">
                <span class="text-sm font-bold bg-indigo-700 px-3 py-1 rounded-full"><i class="fa-solid fa-user mr-2"></i><span sec:authentication="name">User</span></span>
                <a th:href="@{/}" class="hover:text-gray-300 font-medium border-l border-indigo-400 pl-4">Mua khóa học mới</a>
                <form th:action="@{/logout}" method="post" class="m-0"><button class="hover:text-red-300"><i class="fa-solid fa-sign-out-alt"></i></button></form>
            </div>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Khóa học tôi đã mua</h1>
        <p class="text-gray-600 mb-8">Tiếp tục hành trình học tập cùng chứng chỉ uy tín.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div th:each="course : ${myCourses}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col">
                <img class="w-full h-48 object-cover" th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : 'https://placehold.co/600x400'}">
                <div class="p-6 flex-1 flex flex-col">
                    <h3 class="font-bold text-xl mb-2 text-gray-900" th:text="${course.title}">Course Name</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-2" th:text="${course.description}"></p>
                    <div class="mt-auto">
                        <a th:href="@{/learning/{id}(id=${course.id})}" class="block w-full text-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition rounded-lg">👉 Tiếp tục học (Vào Phòng Học)</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${myCourses.empty}" class="text-center py-20 bg-white rounded-lg shadow mt-4">
             <i class="fa-solid fa-boxes-packing text-4xl text-gray-300 mb-3"></i>
             <p class="text-gray-500 font-medium mb-4">Xin chào lính mới! Bạn chưa đăng ký khóa học nào cả.</p>
             <a th:href="@{/}" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-6 py-2 rounded-full font-bold px-6 py-3 transition"><i class="fa-solid fa-cart-shopping mr-2"></i>Hành trình ngàn dặm bắt đầu từ Catalog</a>
        </div>
    </div>
</body>
</html>
