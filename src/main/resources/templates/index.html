<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LMS Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 font-bold text-xl"><i class="fa-solid fa-graduation-cap mr-2"></i>LMS Academy</div>
                <div class="hidden md:flex items-center">
                    <a th:href="@{/}" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500">Catalog</a>
                    
                    <div sec:authorize="!isAuthenticated()" class="ml-4">
                        <a th:href="@{/login}" class="mx-2 px-4 py-2 rounded-md text-sm font-medium bg-white text-indigo-600 hover:bg-gray-100 shadow">Login</a>
                    </div>
                    
                    <!-- Hiển thị khi đã Đăng nhập -->
                    <div sec:authorize="isAuthenticated()" class="flex items-center ml-6 pl-4 border-l border-indigo-400 gap-4">
                        <div class="flex items-center gap-2 bg-indigo-700 px-3 py-1.5 rounded-full shadow-inner">
                            <i class="fa-solid fa-user-graduate text-lg"></i>
                            <span class="text-sm font-bold" sec:authentication="name" title="Tên tài khoản người dùng">User</span>
                        </div>
                        <a th:href="@{/dashboard}" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded text-sm font-medium transition shadow-sm"><i class="fa-solid fa-gauge mr-1"></i> Dashboard</a>
                        <form th:action="@{/logout}" method="post" class="m-0 p-0">
                            <button type="submit" class="text-sm text-indigo-200 hover:text-red-300 ml-2" title="Đăng xuất"><i class="fa-solid fa-power-off text-lg"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="bg-indigo-700 p-10 text-center text-white mb-10">
        <h1 class="text-4xl font-extrabold mb-4">Master New Skills Today</h1>
        <p class="text-lg">Explore our catalog of professional courses crafted by industry experts.</p>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6" role="alert">
            <span class="block sm:inline" th:text="${param.error}"></span>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Available Courses</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pb-10">
            <div th:each="course : ${courses}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                <img class="w-full h-48 object-cover" th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : 'https://placehold.co/600x400'}" alt="Course image">
                <div class="p-6">
                    <h3 class="font-bold text-xl mb-2 text-gray-900" th:text="${course.title}">Course Name</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3" th:text="${course.description}">Description...</p>
                    <div class="flex items-center text-sm text-gray-500 mb-4">
                        <i class="fa-solid fa-chalkboard-user mr-2"></i>
                        <span th:text="${course.teacher.fullName}">Instructor</span>
                    </div>
                    <div class="flex justify-between items-center mt-4 border-t pt-4">
                        <span class="text-2xl font-bold text-indigo-600" th:text="${'$' + course.price}">$99</span>
                        <form th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition-colors duration-200">
                                Enroll Now
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div th:if="${courses.empty}" class="col-span-3 text-center text-gray-500 py-10">
                <p>No published courses available right now.</p>
            </div>
        </div>
    </div>
</body>
</html>
