<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
    
    <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>
    
    <div class="flex flex-col flex-1 overflow-hidden">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
            <h1 class="text-2xl font-semibold text-gray-800 mb-6">Trang Tổng Quan (Dashboard)</h1>
            
            <!-- Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Card 1 -->
                <div class="bg-white rounded-lg shadow p-6 flex items-center">
                    <div class="p-3 rounded-full bg-blue-100 text-blue-600 mr-4">
                        <i class="fas fa-book-open fa-2x"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Tổng số khóa học</p>
                        <p class="text-2xl font-bold text-gray-800" th:text="${totalCourses}">10</p>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="bg-white rounded-lg shadow p-6 flex items-center">
                    <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4">
                        <i class="fas fa-user-graduate fa-2x"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Tổng số học viên</p>
                        <p class="text-2xl font-bold text-gray-800" th:text="${totalStudents}">1,250</p>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="bg-white rounded-lg shadow p-6 flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                        <i class="fas fa-wallet fa-2x"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Doanh thu ước tính</p>
                        <p class="text-2xl font-bold text-gray-800" th:text="${estimatedRevenue}">$45,000</p>
                    </div>
                </div>
            </div>
            
            <!-- Additional content can go here -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Hoạt động gần đây</h2>
                <div class="text-gray-500 text-sm">
                    <p class="py-2 border-b border-gray-100">User <span class="font-medium text-gray-700">Admin</span> đã đăng nhập.</p>
                    <p class="py-2 border-b border-gray-100">Học viên mới <span class="font-medium text-gray-700">Nguyễn Văn A</span> vừa đăng ký thành công.</p>
                    <p class="py-2">Khóa học <span class="font-medium text-gray-700">Spring Boot Mastery</span> đã có học viên thứ 100.</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
