<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - LMS'">LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .active-link { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside th:fragment="sidebar(activeMenu)" class="bg-gray-800 text-white w-64 flex-shrink-0 hidden md:flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-gray-700">
            <h1 class="text-2xl font-bold text-white"><i class="fas fa-graduation-cap"></i> LMS Portal</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2">
                <li>
                    <a th:href="@{/dashboard}" th:classappend="${activeMenu == 'dashboard' ? 'active-link' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}" class="flex items-center px-6 py-3 transition-colors">
                        <i class="fas fa-home w-6"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a th:href="@{/}" target="_blank" th:classappend="${activeMenu == 'courses' ? 'active-link' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}" class="flex items-center px-6 py-3 transition-colors">
                        <i class="fas fa-book w-6"></i>
                        <span>Xem Danh mục Khóa học</span>
                    </a>
                </li>
                <li>
                    <a href="#" onclick="alert('Tính năng quản lý học viên đang được phát triển ở Phase tiếp theo!'); return false;" th:classappend="${activeMenu == 'students' ? 'active-link' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}" class="flex items-center px-6 py-3 transition-colors">
                        <i class="fas fa-users w-6"></i>
                        <span>Quản lý Học viên</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-4 py-2 text-red-400 hover:bg-gray-700 hover:text-red-300 rounded transition-colors">
                    <i class="fas fa-sign-out-alt w-6"></i>
                    <span>Đăng xuất</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Topbar -->
    <header th:fragment="topbar" class="h-16 bg-white shadow flex items-center justify-between px-6 z-10 w-full">
        <div class="flex items-center">
            <button class="md:hidden text-gray-500 focus:outline-none">
                <i class="fas fa-bars fa-lg"></i>
            </button>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium text-gray-900" sec:authentication="name">User</p>
                    <p class="text-xs text-gray-500">Administrator</p>
                </div>
                <img class="h-9 w-9 rounded-full object-cover border-2 border-indigo-200" src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="Avatar">
            </div>
        </div>
    </header>

</body>
</html>
