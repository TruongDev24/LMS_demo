<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMS - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create an Account</h2>
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" role="alert">
            <span class="block sm:inline" th:text="${error}"></span>
        </div>
        <form th:action="@{/register}" method="post" class="space-y-4" onsubmit="return validatePassword()">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Họ & Tên</label>
                <input type="text" name="fullName" th:value="${fullName}" required minlength="3" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Email (Tên đăng nhập)</label>
                <input type="email" name="username" th:value="${username}" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Mật khẩu</label>
                <input type="password" id="pwd" name="password" required minlength="6" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-xs text-gray-500 mt-1">Mật khẩu phải dài tối thiểu 6 ký tự.</p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Xác nhận Mật khẩu</label>
                <input type="password" id="cpwd" required minlength="6" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p id="pwdError" class="text-red-500 text-xs italic hidden mt-1"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Mật khẩu xác nhận không khớp!</p>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Bạn là ai?</label>
                <select name="role" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="STUDENT" th:selected="${role == 'STUDENT'}">Học viên (Đăng ký học)</option>
                    <option value="TEACHER" th:selected="${role == 'TEACHER'}">Giảng viên (Trở thành Cộng tác viên)</option>
                </select>
            </div>
            <div class="flex items-center justify-between mt-6">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded focus:outline-none w-full transition">Tạo Tài Khoản Mới</button>
            </div>
            <div class="text-center mt-4">
                <a th:href="@{/login}" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">Đã có tài khoản? Trở về Đăng nhập</a>
            </div>
        </form>
        <script>
            function validatePassword() {
                var p = document.getElementById('pwd').value;
                var c = document.getElementById('cpwd').value;
                if(p !== c) {
                    document.getElementById('pwdError').classList.remove('hidden');
                    return false;
                }
                document.getElementById('pwdError').classList.add('hidden');
                return true;
            }
        </script>
    </div>
</body>
</html>
