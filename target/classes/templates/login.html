<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                <i class="fa-solid fa-graduation-cap text-3xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900">LMS Academy</h2>
            <p class="text-gray-500 mt-2">Đăng nhập để tiếp tục hành trình học tập</p>
        </div>
        
        <div th:if="${param.error}" class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm flex items-center">
            <i class="fa-solid fa-triangle-exclamation mr-3 text-lg"></i>
            Tài khoản hoặc mật khẩu không chính xác.
        </div>
        <div th:if="${param.logout}" class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm flex items-center">
            <i class="fa-solid fa-circle-check mr-3 text-lg"></i>
            Bạn đã đăng xuất tài khoản an toàn.
        </div>
        <div th:if="${successMessage}" class="bg-blue-50 border border-blue-300 text-blue-700 px-4 py-3 rounded-lg mb-6 text-sm flex items-center">
            <i class="fa-solid fa-info-circle mr-3 text-lg"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Email (Tên đăng nhập)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" name="username" required class="pl-10 shadow-sm border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" name="password" required class="pl-10 shadow-sm border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">Đăng nhập hệ thống</button>
            </div>
            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">Bạn chưa có tài khoản? <a th:href="@{/register}" class="text-indigo-600 hover:text-indigo-800 font-semibold underline">Đăng ký tự do</a></p>
                <p class="text-sm text-gray-600 mt-2"><a th:href="@{/}" class="text-gray-500 hover:text-gray-800"><i class="fa-solid fa-arrow-left mr-1"></i> Quay về Trang chủ</a></p>
            </div>
        </form>
    </div>
</body>
</html>
