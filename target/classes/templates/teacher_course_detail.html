<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 min-h-screen">
    <div th:if="${successMessage}" class="fixed top-20 right-4 bg-green-500 text-white px-6 py-3 rounded shadow-lg z-50 flex items-center transition-opacity duration-500" id="toast">
        <i class="fa-solid fa-check-circle mr-3"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${error}" class="fixed top-36 right-4 bg-red-500 text-white px-6 py-3 rounded shadow-lg z-50 flex items-center transition-opacity duration-500" id="errorToast">
        <i class="fa-solid fa-triangle-exclamation mr-3"></i>
        <span th:text="${error}"></span>
    </div>
    <script>
        setTimeout(() => { const t = document.getElementById('toast'); if(t) t.style.opacity = '0'; setTimeout(()=> {if(t) t.style.display='none'}, 500); }, 3000);
        setTimeout(() => { const e = document.getElementById('errorToast'); if(e) e.style.opacity = '0'; setTimeout(()=> {if(e) e.style.display='none'}, 500); }, 5000);
    </script>
    <nav class="bg-indigo-600 shadow">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center text-white">
            <a th:href="@{/teacher/courses}" class="hover:text-gray-300"><i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto py-10 px-4 flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-1/3">
            <div class="bg-white shadow rounded-lg p-6">
                <div class="flex justify-between items-start mb-4 border-b border-gray-100 pb-3">
                    <h2 class="text-2xl font-bold text-gray-900" th:text="${course.title}">Course Title</h2>
                    <form th:action="@{/teacher/courses/{id}/toggle-status(id=${course.id})}" method="post">
                        <button type="submit" class="text-xs px-3 py-1.5 rounded font-bold shadow-sm transition" title="Click để Đổi trạng thái"
                                th:classappend="${course.status.name() == 'PUBLISHED'} ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200'">
                            <i class="fa-solid mr-1" th:classappend="${course.status.name() == 'PUBLISHED'} ? 'fa-globe' : 'fa-lock'"></i>
                            <span th:text="${course.status}"></span>
                        </button>
                    </form>
                </div>
                <img th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : 'https://placehold.co/600x400'}" class="w-full rounded mb-4 object-cover h-48" />
                <p class="text-gray-700 text-sm mb-4" th:text="${course.description}"></p>
                <div class="border-t pt-4 mt-4 flex justify-between items-end">
                    <div>
                        <p class="font-bold text-gray-800">Price: <span th:text="${course.price + '$'}" class="text-indigo-600"></span></p>
                        <p class="text-sm text-gray-500 mt-2">Tổng học viên đăng ký: <span th:text="${course.enrollments.size()}" class="font-medium text-gray-900 text-base"></span></p>
                    </div>
                    <form th:action="@{/teacher/courses/{id}/delete(id=${course.id})}" method="post" onsubmit="return confirm('CẢNH BÁO: Xóa toàn bộ Khóa học này? Hành động này không thể hoàn tác!');">
                        <button type="submit" class="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 border border-red-200 rounded transition font-medium">
                            <i class="fa-solid fa-trash mr-1"></i> Xóa Hủy
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="mt-6 bg-white shadow rounded-lg p-6">
                <h3 class="font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-folder-plus mr-2 text-indigo-500"></i>Create Module</h3>
                <form th:action="@{/teacher/courses/{id}/modules(id=${course.id})}" method="post">
                    <input type="text" name="title" minlength="5" placeholder="Tên Chương học (VD: Chương 1: Giới thiệu)" required class="w-full border border-gray-300 rounded p-2 mb-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <input type="number" name="orderNum" min="1" placeholder="Thứ tự sắp xếp (VD: 1)" required class="w-full border border-gray-300 rounded p-2 mb-3 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded p-2 text-sm font-medium transition">Thêm Chương mới</button>
                </form>
            </div>
        </div>
        
        <div class="w-full md:w-2/3">
            <div class="bg-white shadow rounded-lg p-6">
                <h3 class="text-xl font-bold mb-6 text-gray-900 border-b pb-2">Curriculum Builder</h3>
                
                <div th:each="module : ${course.modules}" class="mb-6 border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-gray-50 p-4 border-b border-gray-200 flex justify-between items-center">
                        <span class="font-bold text-gray-800" th:text="${'Chương ' + module.orderNum + ': ' + module.title}"></span>
                        <div class="flex items-center gap-2">
                            <button class="text-xs font-medium text-indigo-600 hover:text-indigo-800 bg-white border border-gray-300 px-3 py-1.5 rounded shadow-sm transition" th:onclick="'document.getElementById(\'lessonModal_'+${module.id}+'\').classList.remove(\'hidden\')'">+ Thêm Bài học</button>
                            <form th:action="@{/teacher/modules/{mid}/delete(mid=${module.id})}" method="post" class="inline m-0" onsubmit="return confirm('Xóa nguyên Chương này và tất cả các bài học bên trong nó?');">
                                <input type="hidden" name="courseId" th:value="${course.id}"/>
                                <button type="submit" class="text-xs text-red-500 hover:bg-red-50 hover:text-red-700 bg-white border border-red-200 px-2.5 py-1.5 rounded shadow-sm transition" title="Xóa Chương"><i class="fa-solid fa-trash"></i></button>
                            </form>
                        </div>
                    </div>
                    <ul class="divide-y divide-gray-100 text-sm text-gray-700 bg-white">
                        <li th:each="l : ${module.lessons}" class="p-3 pl-6 hover:bg-indigo-50 flex items-center justify-between group transition">
                            <div class="flex items-center">
                                <i class="fa-solid fa-video text-indigo-400 mr-3 group-hover:text-indigo-600 transition"></i>
                                <span class="font-medium text-gray-700" th:text="${l.orderNum + '. ' + l.title}"></span>
                            </div>
                            <form th:action="@{/teacher/lessons/{lid}/delete(lid=${l.id})}" method="post" class="hidden group-hover:block m-0" onsubmit="return confirm('Loại bỏ Bài học này khỏi hệ thống?');">
                                <input type="hidden" name="courseId" th:value="${course.id}"/>
                                <button type="submit" class="text-red-400 hover:text-red-600 px-2"><i class="fa-solid fa-trash"></i></button>
                            </form>
                        </li>
                    </ul>
                    
                    <!-- Add Lesson Modal for this Module -->
                    <div th:id="'lessonModal_'+${module.id}" class="hidden fixed inset-0 bg-gray-600 bg-opacity-75 overflow-y-auto h-full w-full flex items-center justify-center z-50">
                        <div class="bg-white p-8 rounded-md shadow-xl w-[600px]">
                            <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Add Lesson to Module <span th:text="${module.orderNum}" class="text-indigo-600"></span></h2>
                            <form th:action="@{/teacher/modules/{mid}/lessons(mid=${module.id})}" method="post">
                                <input type="hidden" name="courseId" th:value="${course.id}" />
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Tiêu đề Bài học</label>
                                        <input type="text" name="title" minlength="5" required class="w-full border-gray-300 rounded border p-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Thứ tự sắp xếp</label>
                                        <input type="number" name="orderNum" min="1" required class="w-full border-gray-300 rounded border p-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">YouTube Embed URL</label>
                                    <input type="url" name="videoUrl" placeholder="https://www.youtube.com/embed/..." required class="w-full border-gray-300 rounded border p-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                                </div>
                                <div class="mb-6">
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Ghi chú / Nội dung</label>
                                    <textarea name="content" rows="4" class="w-full border-gray-300 rounded border p-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                                </div>
                                <div class="flex justify-end gap-3 mt-4 border-t pt-4">
                                    <button type="button" th:onclick="'document.getElementById(\'lessonModal_'+${module.id}+'\').classList.add(\'hidden\')'" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded font-medium transition">Cancel</button>
                                    <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium transition">Save Lesson</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                
                <div th:if="${course.modules.empty}" class="bg-gray-50 border border-dashed border-gray-300 rounded-lg p-10 text-center">
                    <i class="fa-solid fa-folder-open text-gray-300 text-4xl mb-3"></i>
                    <p class="text-gray-500">No curriculum exists yet. Create your first module on the left side to begin structuring your course.</p>
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
